name: iOS build

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: "Upload the IPA to TestFlight after building"
        type: boolean
        default: false

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build signed IPA
    runs-on: macos-latest
    timeout-minutes: 60
    environment: Production
    env:
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.4"
          cache: true

      - name: Flutter / Xcode versions
        run: |
          set -euxo pipefail
          flutter --version
          xcodebuild -version
          pod --version

      - name: Materialize iOS native scaffold
        run: |
          set -euxo pipefail
          flutter create \
            --platforms=ios \
            --project-name moneycontrol \
            --org com.ethankallett \
            --no-pub \
            .
          ls ios/Runner.xcodeproj/project.pbxproj ios/Runner/Info.plist ios/Podfile

      - name: flutter pub get
        run: flutter pub get

      - name: Install signing cert + provisioning profile
        id: signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # macOS `base64 --decode` silently produces a zero-byte file when the
          # input isn't valid base64 (e.g. someone uploaded the raw .p12 /
          # .mobileprovision bytes as the secret value instead of base64).
          # Decode strictly, then sanity-check the size and fall back to a
          # whitespace-tolerant decode if needed.
          decode_secret() {
            local var_name="$1"
            local out_path="$2"
            local payload="${!var_name}"
            if [ -z "$payload" ]; then
              echo "FATAL: secret $var_name is unset or empty" >&2
              exit 1
            fi
            # Try strict decode first.
            printf '%s' "$payload" | base64 --decode -o "$out_path" 2>/dev/null || true
            if [ ! -s "$out_path" ]; then
              # Strip whitespace + retry.
              printf '%s' "$payload" | tr -d '\r\n \t' | base64 --decode -o "$out_path" 2>/dev/null || true
            fi
            if [ ! -s "$out_path" ]; then
              echo "FATAL: $var_name decoded to a zero-byte file. Is the secret value really base64?" >&2
              echo "Hint: re-encode with:" >&2
              echo "  base64 -i your.p12 | pbcopy   # macOS" >&2
              echo "  [Convert]::ToBase64String([IO.File]::ReadAllBytes('your.p12')) | Set-Clipboard   # PowerShell" >&2
              exit 1
            fi
            local size
            size=$(stat -f%z "$out_path" 2>/dev/null || stat -c%s "$out_path")
            echo "Decoded $var_name → $out_path ($size bytes)"
          }
          decode_secret BUILD_CERTIFICATE_BASE64       "$CERT_PATH"
          decode_secret BUILD_PROVISION_PROFILE_BASE64 "$PP_PATH"

          # Quick CMS sanity check so the failure mode is "bad provisioning
          # profile" instead of "mystery error 200 lines later".
          if ! security cms -D -i "$PP_PATH" > /dev/null 2>&1; then
            echo "FATAL: provisioning profile didn't parse as a CMS blob." >&2
            echo "First 200 bytes for debug:" >&2
            head -c 200 "$PP_PATH" | xxd >&2 || true
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          ORIGINAL_KEYCHAINS=$(security list-keychains -d user | sed 's/[" ]//g' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $ORIGINAL_KEYCHAINS

          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          UUID=$(security cms -D -i "$PP_PATH" | /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin)
          NAME=$(security cms -D -i "$PP_PATH" | /usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin)
          cp "$PP_PATH" "$PROFILES_DIR/$UUID.mobileprovision"

          {
            echo "PROFILE_UUID=$UUID"
            echo "PROFILE_NAME=$NAME"
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
          } >> "$GITHUB_ENV"
          echo "Provisioning profile name='$NAME' uuid=$UUID"

      - name: Patch xcconfig + ExportOptions with profile info
        run: |
          set -euxo pipefail
          if ! grep -q 'PROVISIONING_PROFILE_SPECIFIER' ios/Flutter/Release.xcconfig; then
            echo "PROVISIONING_PROFILE_SPECIFIER = $PROFILE_NAME" >> ios/Flutter/Release.xcconfig
          fi
          /usr/bin/sed -i '' "s/__PROFILE_UUID__/$PROFILE_UUID/g" ios/ExportOptions.plist
          cat ios/Flutter/Release.xcconfig
          plutil -p ios/ExportOptions.plist

      - name: Patch project.pbxproj with DEVELOPMENT_TEAM
        run: |
          set -euxo pipefail
          PBX=ios/Runner.xcodeproj/project.pbxproj
          if [ -f "$PBX" ]; then
            # Inject DEVELOPMENT_TEAM right after every PRODUCT_BUNDLE_IDENTIFIER line.
            # Use a python heredoc to keep the rewrite straightforward — sed
            # multi-line replacements are fiddly with the BSD sed on macOS.
            python3 - "$PBX" "$APPLE_TEAM_ID" <<'PY'
          import sys, re, pathlib
          path = pathlib.Path(sys.argv[1])
          team = sys.argv[2]
          src = path.read_text()
          if 'DEVELOPMENT_TEAM' in src:
              print('DEVELOPMENT_TEAM already present, skipping')
              sys.exit(0)
          new = re.sub(
              r'(PRODUCT_BUNDLE_IDENTIFIER = [^;]+;)',
              r'\1\n\t\t\t\tDEVELOPMENT_TEAM = ' + team + ';',
              src,
          )
          path.write_text(new)
          print('Injected DEVELOPMENT_TEAM into', path)
          PY
          fi

      - name: pod install
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Build signed IPA
        run: |
          set -euxo pipefail
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define=APP_DEEP_LINK_SCHEME=moneycontrol \
            --build-number=${{ github.run_number }}
          ls -la build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoneyControl-ipa-${{ github.run_number }}
          path: apps/mobile/build/ios/ipa/*.ipa
          retention-days: 14
          if-no-files-found: error

      - name: Upload to TestFlight (manual only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_testflight == 'true' }}
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          printf '%s' "$APPSTORE_API_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          IPA=$(ls build/ios/ipa/*.ipa | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"

      - name: Cleanup signing material
        if: always()
        run: |
          set +e
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$RUNNER_TEMP/build_certificate.p12" "$RUNNER_TEMP/build_pp.mobileprovision" || true
          rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_"*.p8 || true
